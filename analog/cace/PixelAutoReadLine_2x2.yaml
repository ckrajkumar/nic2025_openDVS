#--------------------------------------------------------------
# CACE circuit characterization file
#--------------------------------------------------------------

name:           openDVS_pixel2x2
description:    Pixel auto-readLine event-driven transient characterization (2x2 array, PEX)
PDK:            sky130B

cace_format:    5.2

authorship:
  designer:         Rui Graca
  creation_date:    17 May, 2026

paths:
  root:             ..
  schematic:        xschem
  netlist:          netlist

pins:
  vdd:
    description: Positive power supply
    type: power
    direction: inout
    Vmin: 1.62
    Vmax: 1.98
  gnd:
    description: Ground
    type: ground
    direction: inout

default_conditions:
  vdd:
    description: Power supply voltage
    display: Vdd
    unit: V
    minimum: 1.62
    typical: 1.8
    maximum: 1.98
  corner:
    description: Process corner
    display: Corner
    typical: tt
  temperature:
    description: Ambient temperature
    display: Temp
    unit: "\u00b0C"
    minimum: 0
    typical: 27
    maximum: 70
  xPexType:
    description: "PEX extraction type: simple, r, c, cc, rc, rcc"
    display: PEX Type
    typical: rcc
  xPrBp:
    description: Photoreceptor bias current
    display: PrBp
    unit: A
    typical: 10e-9
  xPrSFBp:
    description: Source follower bias current
    display: PrSFBp
    unit: A
    typical: 100e-12
  xDiffBn:
    description: Diff amp bias current
    display: DiffBn
    unit: A
    typical: 5e-9
  xRefrBp:
    description: Refractory period bias current
    display: RefrBp
    unit: A
    typical: 400e-12
  xOnBn:
    description: ON comparator bias current
    display: OnBn
    unit: A
    typical: 200e-9
  xOffBn:
    description: OFF comparator bias current
    display: OffBn
    unit: A
    typical: 0.25e-9
  xipd:
    description: Photodiode DC current (Pix[0])
    display: Ipd
    unit: A
    typical: 1e-9
  xipd1:
    description: Photodiode current pixel 1
    display: Ipd1
    unit: A
    typical: 1e-9
  xipd2:
    description: Photodiode current pixel 2
    display: Ipd2
    unit: A
    typical: 1e-9
  xipd3:
    description: Photodiode current pixel 3
    display: Ipd3
    unit: A
    typical: 1e-9

parameters:
  autoread_tran:
    display: Auto-readLine event-driven transient (2x2)
    spec:
      event_count:
        display: Event Count
        description: Total number of ON/OFF events detected during simulation
        unit: ""
        minimum:
          value: 1
          fail: true
        typical:
          value: any
        maximum:
          value: any
      first_event_time:
        display: First Event Time
        description: Time of first event detection
        unit: ms
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
      mean_event_period:
        display: Mean Event Period
        description: Mean time between consecutive events
        unit: ms
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
      readline_swing:
        display: ReadLine Swing
        description: Peak readLine voltage swing during read (should pull low via ON/OFF transistor)
        unit: V
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
      reset_recovery_time:
        display: Reset Recovery Time
        description: Time for vdiff to settle after reset sequence
        unit: us
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: tb_PixelAutoReadLine_tran_2x2.sch
        format: ascii
        suffix: .data
        variables: [event_count, first_event_time, mean_event_period, readline_swing, reset_recovery_time]
    conditions:
      vdd:
        enumerate: [1.62, 1.8, 1.98]
      temperature:
        enumerate: [0, 27, 70]
      corner:
        enumerate: [tt, ss, ff, sf, fs]
      xPexType:
        enumerate: [cc]
