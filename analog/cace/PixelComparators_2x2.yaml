#--------------------------------------------------------------
# CACE circuit characterization file
#--------------------------------------------------------------

name:           openDVS_pixel2x2
description:    Pixel comparators DC threshold characterization (2x2 array, PEX)
PDK:            sky130B

cace_format:    5.2

authorship:
  designer:         Rui Graca
  creation_date:    17 May, 2026

paths:
  root:             ..
  schematic:        xschem
  netlist:          netlist

pins:
  vdd:
    description: Positive power supply
    type: power
    direction: inout
    Vmin: 1.62
    Vmax: 1.98
  gnd:
    description: Ground
    type: ground
    direction: inout

default_conditions:
  vdd:
    description: Power supply voltage
    display: Vdd
    unit: V
    minimum: 1.62
    typical: 1.8
    maximum: 1.98
  corner:
    description: Process corner
    display: Corner
    typical: tt
  temperature:
    description: Ambient temperature
    display: Temp
    unit: "\u00b0C"
    minimum: 0
    typical: 27
    maximum: 50
  xBiasSet:
    description: "Bias set: 1=OnBn200n/OffBn0.5n, 2=OnBn100n/OffBn1n"
    display: BiasSet
    typical: 1
  xPexType:
    description: "PEX extraction type: simple, r, c, cc, rc, rcc"
    display: PEX Type
    typical: rcc
  xipd0:
    description: Photodiode current pixel 0
    display: Ipd0
    unit: A
    typical: 1e-9
  xipd1:
    description: Photodiode current pixel 1
    display: Ipd1
    unit: A
    typical: 1e-9
  xipd2:
    description: Photodiode current pixel 2
    display: Ipd2
    unit: A
    typical: 1e-9
  xipd3:
    description: Photodiode current pixel 3
    display: Ipd3
    unit: A
    typical: 1e-9

parameters:
  comparator_dc:
    display: Comparator DC threshold characterization (2x2)
    spec:
      vthresh_on:
        display: ON Threshold
        description: Vdiff at which ON output crosses vdd/2 (rising)
        unit: V
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
      vthresh_off:
        display: OFF Threshold
        description: Vdiff at which nOFF output crosses vdd/2 (falling)
        unit: V
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
      on_thresh_input:
        display: ON Input Threshold
        description: ON threshold referred to photoreceptor input (photodiode current change)
        unit: ""
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
      off_thresh_input:
        display: OFF Input Threshold
        description: OFF threshold referred to photoreceptor input (photodiode current change)
        unit: ""
        minimum:
          value: any
        typical:
          value: any
        maximum:
          value: any
    tool:
      ngspice:
        template: tb_PixelComparators_dc_2x2.sch
        format: ascii
        suffix: .data
        variables: [vthresh_on, vthresh_off, on_thresh_input, off_thresh_input]
    conditions:
      vdd:
        enumerate: [1.62, 1.8, 1.98]
      temperature:
        enumerate: [0, 27, 70]
      corner:
        enumerate: [tt, ss, ff, sf, fs]
      xBiasSet:
        enumerate: [1]
      xPexType:
        enumerate: [cc]
